<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pro Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🎧 Playlist</h2>

    <input type="text" id="search" placeholder="Search songs...">

    <ul id="playlist"></ul>
  </div>

  <!-- Main -->
  <div class="main">

    <h1 class="logo">🎵 My Music Player</h1>

    <img id="cover" src="">
    <h2 id="title">Loading...</h2>
    <p id="artist"></p>

    <!-- Equalizer -->
    <div class="equalizer">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <audio id="audio"></audio>

    <!-- Controls -->
    <div class="controls">

      <div class="buttons">
        <button id="prev">⏮</button>
        <button id="play" class="play-btn">▶</button>
        <button id="next">⏭</button>
        <button id="shuffle">🔀</button>
        <button id="repeat">🔁</button>
        <button id="fav">❤️</button>
      </div>

      <!-- Seek -->
      <div class="slider-box">
        <label>⏱ Seek</label>
        <input type="range" id="progress" value="0">
      </div>

      <!-- Volume -->
      <div class="slider-box">
        <label>🔊 Volume</label>
        <input type="range" id="volume" min="0" max="1" step="0.01">
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
